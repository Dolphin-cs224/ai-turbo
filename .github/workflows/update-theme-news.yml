name: Update Theme News

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: write

concurrency:
  group: update-theme-news
  cancel-in-progress: false

jobs:
  update-theme-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update theme news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python -m scripts.update_theme_news_scores

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/theme_news_scores.csv data/theme_news_items.csv

          if git diff --cached --quiet; then
            echo "변경된 뉴스 데이터가 없습니다."
          else
            git commit -m "Update daily theme news data"
            git push
          fi
